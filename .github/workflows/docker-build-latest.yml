name: Docker-Build-Latest

on:
  # push:
  #   branches:
  #     - main*
  #   paths:
  #     - "Dockerfile"
  #     - ".github/workflows/docker-autoendpoint-latest.yml"
  workflow_dispatch:

env:
  branch: latest
  image_org: forkdo
  ghcr_registry: ghcr.io
  acr_registry: registry.cn-guangzhou.aliyuncs.com
  hcr_registry: swr.ap-southeast-3.myhuaweicloud.com
  tcr_registry: sgccr.ccs.tencentyun.com

permissions:
  contents: read
  packages: write

jobs:
  build:
    strategy:
      matrix:
        service: [autoendpoint, autoconnect]
    runs-on: ubuntu-24.04
    env:
      package_name: ${{ matrix.service }}
    outputs:
      tag: ${{ steps.set_tag.outputs.tag }}
      package_name: ${{ env.package_name }}
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v6

      - name: Set tag without prefix
        id: set_tag
        run: |
            ref_tag=$(git rev-parse --short HEAD)
            echo "Detected tag: $ref_tag"
            echo "tag=$ref_tag" >> $GITHUB_ENV
            echo "tag=$ref_tag" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.package_name }}
          labels: |
            org.opencontainers.image.title=${{ env.package_name }}
            org.opencontainers.image.vendor=Jetsung Chan
          tags: |
            type=raw,value=latest

      # - name: Build with Bake
      #   uses: docker/bake-action@v7
      #   with:
      #     files: |
      #       ./docker-bake.hcl
      #       cwd://${{ steps.meta.outputs.bake-file }}
      #     targets: release
      #     push: false
      #     provenance: false
      #     set: |
      #       *.output=type=oci,dest=./image.tar
      #       release.args.VERSION=${{ steps.get_version.outputs.version }}

      - name: Build image and create OCI artifact
        uses: docker/build-push-action@v7
        with:
            context: .
            platforms: linux/amd64,linux/arm64
            push: false
            provenance: false
            build-args: |
              BINARY=${{ env.package_name }}
              CRATE=${{ env.package_name }}
              BUILD_ARGS=--features=redis  --no-default-features              
            outputs: type=oci,dest=./image.tar

      - name: Upload image as artifact
        uses: actions/upload-artifact@v7
        with:
          name: docker-image-${{ matrix.service }}
          path: ./image.tar
          retention-days: 1

  sync-to-ghcr:
    needs: build
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        service: [autoendpoint, autoconnect]
    steps:
    - name: Install Skopeo
      uses: jetsung/install-skopeo@v1
    - name: Check Skopeo
      run: |
        skopeo --version
    - name: Login to GitHub Container Registry (ghcr.io)
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Download image artifact
      uses: actions/download-artifact@v8
      with:
        name: docker-image-${{ matrix.service }}
        path: .
    - name: Sync to GitHub Container Registry (ghcr.io)
      env:
        SRC_IMAGE: oci-archive:./image.tar
        DEST_REPO: ${{ env.ghcr_registry }}/${{ env.image_org }}/${{ matrix.service }}
        DEST_TAG: ${{ needs.build.outputs.tag }}
      run: |
          skopeo copy --all $SRC_IMAGE docker://$DEST_REPO:$DEST_TAG
          skopeo copy --all $SRC_IMAGE docker://$DEST_REPO:latest
    - uses: actions/delete-package-versions@v5
      continue-on-error: true
      with:
        package-name: ${{ matrix.service }}
        package-type: 'container'
        min-versions-to-keep: 2
        delete-only-untagged-versions: 'true'

  sync-to-docker:
    needs: build
    runs-on: ubuntu-24.04
    continue-on-error: true
    steps:
    - name: Check Docker Hub credentials
      id: check_dockerhub
      run: |
        if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ] || [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
          echo "Docker Hub credentials not configured, skipping..."
          echo "skip=true" >> $GITHUB_OUTPUT
        else
          echo "skip=false" >> $GITHUB_OUTPUT
        fi
    - name: Install Skopeo
      if: steps.check_tencent.outputs.skip != 'true'
      uses: jetsung/install-skopeo@v1
    - name: Check Skopeo
      if: steps.check_tencent.outputs.skip != 'true'
      run: |
        skopeo --version
    - name: Login to Docker Hub
      if: steps.check_dockerhub.outputs.skip != 'true'
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    - name: Download image artifact
      if: steps.check_dockerhub.outputs.skip != 'true'
      uses: actions/download-artifact@v8
      with:
        name: docker-image
        path: .
    - name: Sync to Docker Hub
      if: steps.check_dockerhub.outputs.skip != 'true'
      env:
        SRC_IMAGE: oci-archive:./image.tar
        DEST_REPO: ${{ env.image_org }}/${{ env.package_name }}
        DEST_TAG: ${{ needs.build.outputs.tag }}
      run: |
          skopeo copy --all $SRC_IMAGE docker://$DEST_REPO:$DEST_TAG
          skopeo copy --all $SRC_IMAGE docker://$DEST_REPO:latest
          
  sync-to-aliyun:
    needs: build
    runs-on: ubuntu-24.04
    continue-on-error: true
    steps:
    - name: Check Aliyun credentials
      id: check_aliyun
      run: |
        if [ -z "${{ secrets.ALIYUN_USERNAME }}" ] || [ -z "${{ secrets.ALIYUN_TOKEN }}" ]; then
          echo "Aliyun credentials not configured, skipping..."
          echo "skip=true" >> $GITHUB_OUTPUT
        else
          echo "skip=false" >> $GITHUB_OUTPUT
        fi
    - name: Install Skopeo
      if: steps.check_tencent.outputs.skip != 'true'
      uses: jetsung/install-skopeo@v1
    - name: Check Skopeo
      if: steps.check_tencent.outputs.skip != 'true'
      run: |
        skopeo --version
    - name: Login to Aliyun
      if: steps.check_aliyun.outputs.skip != 'true'
      uses: docker/login-action@v4
      with:
        registry: ${{ env.acr_registry }}
        username: ${{ secrets.ALIYUN_USERNAME }}
        password: ${{ secrets.ALIYUN_TOKEN }}
    - name: Download image artifact
      if: steps.check_aliyun.outputs.skip != 'true'
      uses: actions/download-artifact@v8
      with:
        name: docker-image
        path: .
    - name: Sync to Aliyun
      if: steps.check_aliyun.outputs.skip != 'true'
      env:
        SRC_IMAGE: oci-archive:./image.tar
        DEST_REPO: ${{ env.acr_registry }}/${{ env.image_org }}/${{ env.package_name }}
        DEST_TAG: ${{ needs.build.outputs.tag }}
      run: |
          skopeo copy --all $SRC_IMAGE docker://$DEST_REPO:$DEST_TAG
          skopeo copy --all $SRC_IMAGE docker://$DEST_REPO:latest

  sync-to-tencent:
    needs: build
    runs-on: ubuntu-24.04
    continue-on-error: true
    steps:
    - name: Check Tencent credentials
      id: check_tencent
      run: |
        if [ -z "${{ secrets.TENCENT_USERNAME }}" ] || [ -z "${{ secrets.TENCENT_TOKEN }}" ]; then
          echo "Tencent credentials not configured, skipping..."
          echo "skip=true" >> $GITHUB_OUTPUT
        else
          echo "skip=false" >> $GITHUB_OUTPUT
        fi
    - name: Install Skopeo
      if: steps.check_tencent.outputs.skip != 'true'
      uses: jetsung/install-skopeo@v1
    - name: Check Skopeo
      if: steps.check_tencent.outputs.skip != 'true'
      run: |
        skopeo --version
    - name: Login to Tencent
      if: steps.check_tencent.outputs.skip != 'true'
      uses: docker/login-action@v4
      with:
        registry: ${{ env.tcr_registry }}
        username: ${{ secrets.TENCENT_USERNAME }}
        password: ${{ secrets.TENCENT_TOKEN }}
    - name: Download image artifact
      if: steps.check_tencent.outputs.skip != 'true'
      uses: actions/download-artifact@v8
      with:
        name: docker-image
        path: .
    - name: Sync to Tencent
      if: steps.check_tencent.outputs.skip != 'true'
      env:
        SRC_IMAGE: oci-archive:./image.tar
        DEST_REPO: ${{ env.tcr_registry }}/${{ env.image_org }}/${{ env.package_name }}
        DEST_TAG: ${{ needs.build.outputs.tag }}
      run: |
          skopeo copy --all $SRC_IMAGE docker://$DEST_REPO:$DEST_TAG
          skopeo copy --all $SRC_IMAGE docker://$DEST_REPO:latest
          